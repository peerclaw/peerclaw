server:
  http_addr: ":8080"

auth:
  required: true

database:
  driver: "postgres"
  dsn: "${DATABASE_URL}"

redis:
  addr: "redis:6379"
  password: "${REDIS_PASSWORD}"
  db: 0

signaling:
  enabled: true

bridge:
  a2a:
    enabled: true
  mcp:
    enabled: true
  acp:
    enabled: true

user_auth:
  enabled: true
  jwt_secret: "${JWT_SECRET}"
  admin_emails: []    # emails auto-promoted to admin on login/register

# smtp:                          # Uncomment to enable email verification
#   host: "smtp.example.com"
#   port: 465
#   username: "${SMTP_USERNAME}"
#   password: "${SMTP_PASSWORD}"
#   from: "noreply@example.com"
#   tls: true

rate_limit:
  enabled: true
  requests_per_sec: 100
  burst_size: 200
  max_connections: 1000

audit_log:
  enabled: true
  output: "stdout"

logging:
  level: "info"
  format: "json"
