server:
  http_addr: ":8080"

auth:
  required: true

database:
  driver: "postgres"
  dsn: "${DATABASE_URL}"

redis:
  addr: "redis:6379"
  password: "${REDIS_PASSWORD}"
  db: 0

signaling:
  enabled: true

bridge:
  a2a:
    enabled: true
  mcp:
    enabled: true
  acp:
    enabled: true

user_auth:
  enabled: true
  jwt_secret: "${JWT_SECRET}"
  admin_emails: []    # emails auto-promoted to admin on login/register

# smtp:                          # Uncomment to enable email verification
#   host: "smtp.example.com"
#   port: 465
#   username: "${SMTP_USERNAME}"
#   password: "${SMTP_PASSWORD}"
#   from: "noreply@example.com"
#   tls: true

rate_limit:
  enabled: true
  requests_per_sec: 100
  burst_size: 200
  max_connections: 1000

audit_log:
  enabled: true
  output: "stdout"

# retention:                          # Data retention auto-cleanup
#   enabled: true                     # default true
#   reputation_events_days: 90        # prune reputation events older than 90 days
#   invocations_days: 30              # prune invocation records older than 30 days
#   abuse_reports_days: 365           # prune resolved abuse reports older than 365 days
#   cleanup_interval: "1h"            # how often to run cleanup

# version_check:                      # SDK version check (GitHub Releases)
#   enabled: true                     # default true
#   repo: "peerclaw/peerclaw-cli"     # GitHub repo for latest release
#   interval: "1h"                    # how often to poll GitHub

# notification:                       # Notification system
#   enabled: true                     # default true
#   retention_days: 90                # prune notifications older than 90 days
#   email_enabled: false              # email for critical events (requires smtp config)
#   email_on_offline: true            # email when agent goes offline

# openclaw:                              # OpenClaw Channel Plugin integration
#   gateway_url: "ws://localhost:18789"   # OpenClaw gateway WebSocket URL
#   auth_token: ""                        # gateway auth token (optional)

logging:
  level: "info"
  format: "json"
